<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Upload Photo — PhotoShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/timeline"><i class="bi bi-camera-fill me-1"></i>PhotoShare</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/timeline">Timeline</a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/auth/logout}" method="post" class="d-inline">
                        <button class="btn btn-link nav-link text-white" type="submit">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6">
            <h4 class="mb-3"><i class="bi bi-cloud-upload me-2"></i>Upload a Photo</h4>

            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/upload}" th:object="${form}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">Photo <span class="text-danger">*</span></label>
                            <input type="file" name="file" accept="image/*"
                                   class="form-control" th:classappend="${#fields.hasErrors('file')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{file}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Caption</label>
                            <input type="text" th:field="*{caption}" class="form-control"
                                   maxlength="200" placeholder="Describe your photo…"
                                   th:classappend="${#fields.hasErrors('caption')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{caption}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tags</label>
                            <input type="text" th:field="*{tags}" class="form-control"
                                   placeholder="nature, travel, food  (comma separated)"/>
                            <div class="form-text">Separate tags with commas.</div>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">
                            <i class="bi bi-upload me-1"></i>Publish
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
