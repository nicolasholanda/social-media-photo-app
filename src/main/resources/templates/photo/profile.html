<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${profileUsername} + ' — PhotoShare'">Profile — PhotoShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background-color: #f8f9fa; }
        .photo-card img { width: 100%; height: 220px; object-fit: cover; }
        .navbar-brand { font-weight: 700; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/timeline"><i class="bi bi-camera-fill me-1"></i>PhotoShare</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/timeline">Timeline</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/upload">Upload</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/auth/logout}" method="post" class="d-inline">
                        <button class="btn btn-link nav-link text-white" type="submit">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex align-items-center gap-3 mb-4">
        <div class="bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center"
             style="width: 64px; height: 64px; font-size: 2rem;">
            <i class="bi bi-person"></i>
        </div>
        <div>
            <h4 class="mb-0" th:text="${profileUsername}"></h4>
            <small class="text-muted" th:text="${photos.totalElements} + ' photos'"></small>
        </div>
    </div>

    <div th:if="${photos.isEmpty()}" class="text-center text-muted py-5">
        <i class="bi bi-images" style="font-size: 3rem;"></i>
        <p class="mt-2">No photos yet.</p>
    </div>

    <div class="row g-3">
        <div class="col-12 col-sm-6 col-md-4 col-lg-3" th:each="photo : ${photos}">
            <div class="card photo-card shadow-sm h-100">
                <a th:href="@{/photos/{id}(id=${photo.id})}">
                    <img th:src="@{/photos/{id}/image(id=${photo.id})}" th:alt="${photo.caption}" class="card-img-top"/>
                </a>
                <div class="card-body p-2">
                    <p class="card-text small text-truncate mb-1" th:text="${photo.caption ?: ''}"></p>
                    <small class="text-muted"
                           th:text="${#temporals.format(photo.createdAt, 'dd MMM yyyy')}"></small>
                </div>
            </div>
        </div>
    </div>

    <nav th:if="${photos.totalPages > 1}" class="mt-4 d-flex justify-content-center">
        <ul class="pagination">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/profile/{u}(u=${profileUsername}, page=${currentPage - 1})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, photos.totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/profile/{u}(u=${profileUsername}, page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == photos.totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/profile/{u}(u=${profileUsername}, page=${currentPage + 1})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
