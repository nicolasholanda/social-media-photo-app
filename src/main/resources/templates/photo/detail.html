<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${photo.caption ?: 'Photo'} + ' — PhotoShare'">Photo — PhotoShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; }
        .photo-main { max-height: 600px; object-fit: contain; width: 100%; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/timeline"><i class="bi bi-camera-fill me-1"></i>PhotoShare</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/upload">Upload</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/auth/logout}" method="post" class="d-inline">
                        <button class="btn btn-link nav-link text-white" type="submit">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${commentError}" class="alert alert-warning" th:text="${commentError}"></div>

            <div class="card shadow-sm mb-3">
                <img th:src="@{/photos/{id}/image(id=${photo.id})}"
                     th:alt="${photo.caption}"
                     class="card-img-top photo-main"/>
                <div class="card-body">
                    <p th:if="${photo.caption}" class="card-text fs-5" th:text="${photo.caption}"></p>
                    <div class="d-flex flex-wrap gap-1 mb-2">
                        <a th:each="tag : ${photo.tags}"
                           th:href="@{/timeline(tag=${tag.name})}"
                           class="badge bg-secondary text-decoration-none"
                           th:text="'#' + ${tag.name}"></a>
                    </div>
                    <small class="text-muted">
                        Posted by
                        <a th:href="@{/profile/{u}(u=${photo.author.username})}"
                           th:text="${photo.author.username}"></a>
                        on
                        <span th:text="${#temporals.format(photo.createdAt, 'dd MMM yyyy HH:mm')}"></span>
                    </small>

                    <div sec:authorize="isAuthenticated()" th:if="${#authentication.name == photo.author.username}" class="mt-3">
                        <form th:action="@{/photos/{id}/delete(id=${photo.id})}" method="post"
                              onsubmit="return confirm('Delete this photo?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash me-1"></i>Delete photo
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <h5 class="mb-3">Comments (<span th:text="${photo.comments.size()}"></span>)</h5>

            <div th:each="comment : ${photo.comments}" class="card mb-2">
                <div class="card-body py-2 px-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <strong>
                                <a th:href="@{/profile/{u}(u=${comment.author.username})}"
                                   th:text="${comment.author.username}" class="text-dark text-decoration-none"></a>
                            </strong>
                            <small class="text-muted ms-2"
                                   th:text="${#temporals.format(comment.createdAt, 'dd MMM HH:mm')}"></small>
                            <p class="mb-0 mt-1" th:text="${comment.content}"></p>
                        </div>
                        <div sec:authorize="isAuthenticated()" th:if="${#authentication.name == comment.author.username}">
                            <form th:action="@{/photos/{pid}/comments/{cid}/delete(pid=${photo.id}, cid=${comment.id})}"
                                  method="post">
                                <button type="submit" class="btn btn-sm btn-link text-danger p-0">
                                    <i class="bi bi-x-lg"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div sec:authorize="isAuthenticated()" class="card mt-3">
                <div class="card-body">
                    <form th:action="@{/photos/{id}/comments(id=${photo.id})}"
                          th:object="${commentForm}" method="post">
                        <div class="mb-2">
                            <textarea th:field="*{content}" class="form-control" rows="2"
                                      placeholder="Write a comment…" maxlength="500"></textarea>
                        </div>
                        <button type="submit" class="btn btn-dark btn-sm">Post comment</button>
                    </form>
                </div>
            </div>

            <div class="mt-3">
                <a href="/timeline" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Back to timeline
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
